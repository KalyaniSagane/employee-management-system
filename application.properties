# Server
server.port=8080

# MySQL / Amazon RDS Configuration
# In production these values come from environment variables set on the EC2 instance,
# not committed to source control.
spring.datasource.url=jdbc:mysql://${RDS_ENDPOINT:localhost}:3306/employee_db
spring.datasource.username=${RDS_USERNAME:root}
spring.datasource.password=${RDS_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
